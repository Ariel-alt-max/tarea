{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow border-0" style="border-radius: 15px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark">Bienvenido</h2>
                    <p class="text-muted">Ingresa a tu cuenta para continuar</p>
                </div>

                <form action="{{url_for('login')}}" method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase text-secondary">Correo electrónico</label>
                        <input type="email" name="email" class="form-control bg-light border-0 p-3" 
                               placeholder="ejemplo@correo.com" style="border-radius: 10px;" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase text-secondary">Contraseña</label>
                        <input type="password" name="password" class="form-control bg-light border-0 p-3" 
                               placeholder="••••••••" style="border-radius: 10px;" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 p-3 fw-bold shadow-sm" 
                            style="border-radius: 10px;">
                        Entrar
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="small text-muted mb-0">
                        ¿No tienes cuenta? 
                        <a href="{{url_for('registro')}}" class="text-primary text-decoration-none fw-bold">Regístrate aquí</a>
                    </p>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-3">
            <a href="/" class="text-muted small text-decoration-none">← Volver al inicio</a>
        </div>
    </div>
</div>

<style>
    .form-control:focus {
        background-color: #fff !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
        border: 1px solid #0d6efd;
    }
</style>
{% endblock %}
