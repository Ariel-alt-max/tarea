{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0" style="border-radius: 15px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark">Crear cuenta</h2>
                    <p class="text-muted">Únete para empezar a gestionar tus tareas</p>
                </div>

                <form method="POST" action="{{url_for('registro')}}">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase text-secondary">Nombre Completo</label>
                        <input type="text" name="nombre" class="form-control bg-light border-0 p-3" 
                               placeholder="Tu nombre" style="border-radius: 10px;" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase text-secondary">Correo electrónico</label>
                        <input type="email" name="email" class="form-control bg-light border-0 p-3" 
                               placeholder="ejemplo@correo.com" style="border-radius: 10px;" required>
                    </div>

                    <div class="mb-3">
                        <label for="contraseña" class="form-label small fw-bold text-uppercase text-secondary">Contraseña</label>
                        <input type="password" name="contraseña" id="contraseña" class="form-control bg-light border-0 p-3" 
                               placeholder="Mínimo 8 caracteres" style="border-radius: 10px;" minlength="8" required>
                    </div>

                    <div class="mb-4">
                        <label for="confirmarcontra" class="form-label small fw-bold text-uppercase text-secondary">Confirmar contraseña</label>
                        <input type="password" name="confirmarcontra" id="confirmarcontra" class="form-control bg-light border-0 p-3" 
                               placeholder="Repite tu contraseña" style="border-radius: 10px;" minlength="8" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 p-3 fw-bold shadow-sm" style="border-radius: 10px;">
                        Registrarme
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="small text-muted mb-0">
                        ¿Ya tienes cuenta? 
                        <a href="{{url_for('login')}}" class="text-primary text-decoration-none fw-bold">Inicia sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Efecto de foco para los inputs para mantener coherencia con el Login */
    .form-control:focus {
        background-color: #fff !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
        border: 1px solid #0d6efd;
    }
</style>
{% endblock %}
