{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Bienvenido</h2>
                    <p class="text-muted">Ingresa a tu cuenta</p>
                </div>
                <form action="{{url_for('login')}}" method="POST">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase">Correo electrónico</label>
                        <input type="email" name="email" class="form-control bg-light border-0 p-3" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase">Contraseña</label>
                        <input type="password" name="password" class="form-control bg-light border-0 p-3" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 p-3 fw-bold rounded-3">Entrar</button>
                </form>
                <div class="text-center mt-4">
                    <span class="small text-muted">¿No tienes cuenta? <a href="{{url_for('registro')}}" class="text-primary text-decoration-none fw-bold">Regístrate</a></span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
